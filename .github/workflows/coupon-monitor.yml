name: Coupon Monitor (JTB + KNT + HIS)

on:
  schedule:
    - cron: '0 21 * * *'  # 毎日 6:00 JST
  workflow_dispatch:

permissions:
  contents: write

jobs:
  monitor:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: チェックアウト
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Python セットアップ
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 依存パッケージ
        run: pip install -r requirements.txt

      - name: Playwright ブラウザインストール
        run: python -m playwright install --with-deps chromium

      - name: アフィリエイト設定を復元
        env:
          JTB_AFFILIATE_CONFIG: ${{ secrets.JTB_AFFILIATE_CONFIG }}
          HIS_AFFILIATE_CONFIG: ${{ secrets.HIS_AFFILIATE_CONFIG }}
        run: |
          mkdir -p config
          echo "$JTB_AFFILIATE_CONFIG" > config/jtb_affiliate_links.json
          echo "$HIS_AFFILIATE_CONFIG" > config/his_affiliate_links.json

      - name: JTB クーポン監視
        run: python jtb_coupon_monitor.py

      - name: KNT クーポン監視
        run: python knt_coupon_monitor.py

      - name: HIS クーポン監視
        run: python his_coupon_monitor.py

      - name: ツイート文面生成
        run: python generate_tweets.py

      - name: 変動通知メール送信
        env:
          GMAIL_ADDRESS: ${{ secrets.GMAIL_ADDRESS }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          NOTIFY_EMAIL: ${{ secrets.NOTIFY_EMAIL }}
        run: python daily_diff_notifier.py

      - name: HIS ブログ用HTML生成（テーブル形式）
        run: python generate_his_html.py

      - name: HIS ブログ用HTML生成（リスト形式）
        run: python generate_his_list_html.py

      - name: JTB ブログ用HTML生成（リスト形式）
        run: python generate_jtb_html.py

      - name: ダッシュボード HTML 生成
        run: python generate_dashboard.py

      - name: WordPress クーポンページ下書き更新
        env:
          YF_WP_URL: ${{ secrets.YF_WP_URL }}
          YF_WP_USER: ${{ secrets.YF_WP_USER }}
          YF_WP_APP_PASSWORD: ${{ secrets.YF_WP_APP_PASSWORD }}
        run: python wp_coupon_updater.py --site yakushimafan

      - name: WP更新結果通知
        if: always()
        env:
          GMAIL_ADDRESS: ${{ secrets.GMAIL_ADDRESS }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          NOTIFY_EMAIL: ${{ secrets.NOTIFY_EMAIL }}
        run: python notify_wp_update.py



      - name: コミット＆プッシュ
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add jtb_coupon_data/ knt_coupon_data/ his_coupon_data/ html_output/ tweets_output/ dashboard/ backups/
          if git diff --staged --quiet; then
            echo "✅ 変更なし"
            exit 0
          fi
          git commit -m "📊 クーポンデータ更新 $(date +%Y-%m-%d)"
          # リモートとの同期（最大3回リトライ）
          for i in 1 2 3; do
            git pull --rebase origin main && break
            echo "⚠️ rebase リトライ ($i/3)..."
            sleep 5
          done
          git push origin main

           
