name: Coupon Monitor

on:
  schedule:
    - cron: '0 21 * * *'    # 毎日 6:00 JST: 17社＋当日割当の5日周期会社
  workflow_dispatch:
    inputs:
      provider_id:
        description: 手動チェックする会社
        required: true
        default: all
        type: choice
        options:
          - all
          - his
          - jtb
          - knt
          - jalpack
          - jalan
          - jalan_activity
          - kkday
          - klook
          - jtrip
          - yumeyado
          - rakuten_travel
          - yahoo_travel
          - rurubu_travel
          - ikkyu
          - relux
          - asoview
          - activityjapan
          - club_tourism
          - jr_tokai_tours
          - skypack_tours
          - tobu_top_tours
          - yomiuri_travel
          - toku
          - yukoyuko
          - booking
          - newt
          - surprice
          - traveloka
          - airtrip
          - skyticket
          - jcation
          - jalan_rentacar
          - tabirai_rentacar
          - nippon_travel
          - hankyu_travel
          - jamjam
          - skyscanner
          - jalan_pack
          - orion_tour
          - shirokuma_tour
          - agoda
          - expedia
          - hotels
          - tripcom
permissions:
  contents: write

concurrency:
  group: coupon-monitor-main
  cancel-in-progress: false

jobs:
  monitor:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: チェックアウト
        uses: actions/checkout@v5
        with:
          ref: main
          fetch-depth: 0

      - name: Python セットアップ
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: 依存パッケージ
        run: pip install -r requirements.txt

      - name: Playwright ブラウザインストール
        run: python -m playwright install --with-deps chromium

      - name: 実行対象を決定
        id: plan
        run: |
          if [ "$GITHUB_EVENT_NAME" = "schedule" ]; then
            echo "scope=due" >> "$GITHUB_OUTPUT"
            echo "provider_id=" >> "$GITHUB_OUTPUT"
            echo "label=scheduled: 17 daily + distributed 5-day providers" >> "$GITHUB_OUTPUT"
          else
            echo "scope=all" >> "$GITHUB_OUTPUT"
            echo "provider_id=${{ inputs.provider_id }}" >> "$GITHUB_OUTPUT"
            echo "label=manual: ${{ inputs.provider_id }}" >> "$GITHUB_OUTPUT"
          fi

      - name: アフィリエイト設定を復元
        env:
          JTB_AFFILIATE_CONFIG: ${{ secrets.JTB_AFFILIATE_CONFIG }}
          HIS_AFFILIATE_CONFIG: ${{ secrets.HIS_AFFILIATE_CONFIG }}
          KNT_AFFILIATE_CONFIG: ${{ secrets.KNT_AFFILIATE_CONFIG }}
        run: |
          mkdir -p config
          if [ -n "$JTB_AFFILIATE_CONFIG" ]; then
            printf '%s' "$JTB_AFFILIATE_CONFIG" > config/jtb_affiliate_links.json
          fi
          if [ -n "$HIS_AFFILIATE_CONFIG" ]; then
            printf '%s' "$HIS_AFFILIATE_CONFIG" > config/his_affiliate_links.json
          fi
          if [ -n "$KNT_AFFILIATE_CONFIG" ]; then
            printf '%s' "$KNT_AFFILIATE_CONFIG" > config/knt_affiliate_links.json
          fi

      - name: 会社別クーポンチェック
        run: |
          args=(--scope "${{ steps.plan.outputs.scope }}")
          if [ -n "${{ steps.plan.outputs.provider_id }}" ] && [ "${{ steps.plan.outputs.provider_id }}" != "all" ]; then
            args+=(--provider-id "${{ steps.plan.outputs.provider_id }}")
          fi
          python provider_check_runner.py "${args[@]}"

      - name: ツイート文面生成
        run: python generate_tweets.py

      - name: 変動通知メール送信
        env:
          GMAIL_ADDRESS: ${{ secrets.GMAIL_ADDRESS }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          NOTIFY_EMAIL: ${{ secrets.NOTIFY_EMAIL }}
        run: python daily_diff_notifier.py

      - name: HIS ブログ用HTML生成（テーブル形式）
        run: python generate_his_html.py

      - name: HIS ブログ用HTML生成（リスト形式）
        run: python generate_his_list_html.py

      - name: JTB ブログ用HTML生成（リスト形式）
        run: python generate_jtb_html.py

      - name: ダッシュボード HTML 生成
        run: python generate_dashboard.py

      - name: X投稿ツリー生成（サイト別デイリー3本）
        continue-on-error: true
        run: python generate_x_threads.py

      - name: 実行サマリー
        if: always()
        run: |
          {
            echo "## Coupon monitor"
            echo ""
            echo "- run: ${{ steps.plan.outputs.label }}"
            echo "- scope: ${{ steps.plan.outputs.scope }}"
            echo "- provider_id: ${{ steps.plan.outputs.provider_id }}"
            echo "- AI audit: Codex scheduled task (OpenAI API is not used by Actions)"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: コミット＆プッシュ
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          generated_paths=(
            jtb_coupon_data/
            knt_coupon_data/
            his_coupon_data/
            jalpack_coupon_data/
            rurubu_travel_coupon_data/
            yukoyuko_coupon_data/
            official_coupon_data/
            official_source_data/
            codex_audit_queue/
            provider_check_data/
            html_output/
            tweets_output/
            dashboard/
          )
          staged_paths=()
          for path in "${generated_paths[@]}"; do
            if [ -e "$path" ] || [ -n "$(git ls-files -- "$path")" ]; then
              staged_paths+=("$path")
            fi
          done
          if [ ${#staged_paths[@]} -gt 0 ]; then
            git add -A -- "${staged_paths[@]}"
          fi
          if git diff --staged --quiet; then
            echo "✅ 変更なし"
            exit 0
          fi
          git commit -m "📊 クーポンデータ更新 $(date +%Y-%m-%d)"
          for i in 1 2 3; do
            git pull --rebase origin main && break
            echo "⚠️ rebase リトライ ($i/3)..."
            sleep 5
          done
          git push origin main
