name: JTB Coupon Monitor

on:
  schedule:
    # 毎日朝9時（JST）に実行 = UTC 0:00
    - cron: '0 0 * * *'
  workflow_dispatch:  # 手動実行ボタン

permissions:
  contents: write

jobs:
  monitor:
    runs-on: ubuntu-latest
    steps:
      - name: リポジトリをチェックアウト（最新を取得）
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Python セットアップ
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 依存パッケージをインストール
        run: pip install requests beautifulsoup4 gspread google-auth

      - name: クーポン監視スクリプトを実行
        run: python jtb_coupon_monitor.py

      - name: Google Sheets に書き出し
        env:
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          SPREADSHEET_ID: ${{ secrets.SPREADSHEET_ID }}
        run: python export_to_sheets.py

      - name: データをコミット＆プッシュ
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          # 最新のリモートを取得
          git fetch origin main
          
          # 変更をステージング
          git add jtb_coupon_data/
          
          # 変更がなければ終了
          if git diff --staged --quiet; then
            echo "✅ 変更なし"
            exit 0
          fi
          
          # コミット
          git commit -m "📊 クーポンデータ更新 $(date +%Y-%m-%d)"
          
          # プッシュ（リトライ付き）
          for i in 1 2 3; do
            git pull --rebase origin main --strategy-option=theirs && break
            echo "⚠️ rebase失敗、リトライ $i..."
            git rebase --abort 2>/dev/null || true
            git reset --soft HEAD~1
            git stash
            git pull origin main
            git stash pop
            git add jtb_coupon_data/
            git commit -m "📊 クーポンデータ更新 $(date +%Y-%m-%d)"
          done
          
          git push origin main
