name: JTB Coupon Monitor

on:
  schedule:
    - cron: '0 0 * * *'  # 毎日 9:00 JST
  workflow_dispatch:

permissions:
  contents: write

jobs:
  monitor:
    runs-on: ubuntu-latest
    steps:
      - name: チェックアウト
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Python セットアップ
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 依存パッケージ
        run: pip install requests beautifulsoup4 gspread google-auth

      - name: クーポン監視
        run: python jtb_coupon_monitor.py

      - name: Google Sheets 書き出し
        env:
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          SPREADSHEET_ID: ${{ secrets.SPREADSHEET_ID }}
        run: python export_to_sheets.py

      - name: コミット＆プッシュ
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add jtb_coupon_data/
          if git diff --staged --quiet; then
            echo "✅ 変更なし"
            exit 0
          fi
          git commit -m "📊 クーポンデータ更新 $(date +%Y-%m-%d)"
          git fetch origin main
          git pull --rebase origin main --strategy-option=theirs || {
            git add -A
            git rebase --continue || true
          }
          git push origin main
